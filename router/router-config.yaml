# =============================================================================
# OpenZiti Edge Router Configuration File
# 3-Namespace deployment version: Router runs in router-ns
#
# router-ns IP:
#   10.10.1.1 (gnb-ns side)   10.10.2.1 (core-ns side)   10.10.3.1 (Host side)
# =============================================================================
v: 3
identity:
  cert:        pki/ca/certs/router-client.cert
  key:         pki/ca/keys/router-client.key
  ca:          pki/ca/certs/ca.cert
  server_cert: pki/ca/certs/router-server.cert
  server_key:  pki/ca/keys/router-client.key

ctrl:
  # Controller is in the same router-ns, localhost is sufficient
  endpoint: tls:127.0.0.1:6262
  heartbeatIntervalSeconds: 10

link:
  dialers:
    - binding: transport

# Router only performs Fabric routing, no tunnel intercept/host
listeners:
  - binding: edge
    address: tls:0.0.0.0:3022
    options:
      # Broadcast through the Host side address of router-ns, reachable by both gnb/core
      advertise: 10.10.3.1:3022
      maxConnections: 32768

edge:
  csr:
    country: TW
    province: Taiwan
    locality: Taipei
    organization: MyTelco
    organizationalUnit: 5GCore
    sans:
      dns:
        - localhost
        - ziti-router
      ip:
        - "127.0.0.1"
        - "10.10.1.1"
        - "10.10.2.1"
        - "10.10.3.1"

forwarder:
  latencyProbeInterval: 10
  xgressDialWorkerCount: 128
  xgressDialQueueLength: 10000

healthChecks:
  ctrlPingCheck:
    interval: 30s
    timeout: 15s
    initialDelay: 15s
