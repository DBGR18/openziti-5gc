# =============================================================================
# OpenZiti Controller Configuration File
# 3-Namespace deployment version: Controller runs in router-ns
#
# router-ns IP:
#   10.10.1.1 (gnb-ns side)   10.10.2.1 (core-ns side)   10.10.3.1 (Host side)
# =============================================================================
v: 3

db: data/ctrl.db

identity:
  cert:        pki/ca/certs/ctrl-client.cert
  key:         pki/ca/keys/ctrl-client.key
  ca:          pki/ca/certs/ca.cert
  server_cert: pki/ca/certs/ctrl-server.chain.pem
  server_key:  pki/ca/keys/ctrl-server.key

# Control plane listener (for Router connections)
ctrl:
  listener: tls:0.0.0.0:6262
  options:
    # Router is in the same namespace, localhost is sufficient
    # Tunneler in gnb-ns/core-ns also needs to connect via 10.10.x.1
    advertiseAddress: tls:10.10.3.1:6262
    connectTimeout: 15s
    writeTimeout: 15s

# Edge Management API
edge:
  enrollment:
    signingCert:
      cert: pki/ca/certs/ctrl-intermediate.cert
      key:  pki/ca/keys/ctrl-intermediate.key
    edgeIdentity:
      duration: 180m
    edgeRouter:
      duration: 180m
  api:
    listener: 0.0.0.0:1280
    # Host managed via 10.10.3.1, gnb-ns uses 10.10.1.1, core-ns uses 10.10.2.1
    address: 10.10.3.1:1280
    sessionTimeout: 30m
    activityTimeout: 10m

web:
  - name: client-management
    bindPoints:
      - interface: 0.0.0.0:1280
        address: 10.10.3.1:1280
    apis:
      - binding: edge-management
        options: {}
      - binding: edge-client
        options: {}
      - binding: fabric
        options: {}

healthChecks:
  boltCheck:
    interval: 30s
    timeout: 20s
    initialDelay: 30s
