# =============================================================================
# Ziti Edge Router Policies & Service Edge Router Policies
# Control which Identities can access which Routers
#
# After modifying this file, run: make apply-policies
# =============================================================================

edgeRouterPolicies:

  # All gNBs can use all Routers
  - name: gnb-use-all-routers
    identityRoles:
      - "#gnb-side"
    edgeRouterRoles:
      - "#all"

  # All core network hosts can use all Routers
  - name: core-use-all-routers
    identityRoles:
      - "#core-side"
    edgeRouterRoles:
      - "#all"

  # Advanced: Limit available Routers by area
  # - name: north-gnb-north-router
  #   identityRoles:
  #     - "#region-north"
  #   edgeRouterRoles:
  #     - "#router-north"

serviceEdgeRouterPolicies:

  # All core network services can be provided through all Routers
  - name: core-services-all-routers
    serviceRoles:
      - "#core-services"
    edgeRouterRoles:
      - "#all"
