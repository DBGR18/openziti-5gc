# =============================================================================
# Ziti Services Definitions
# Corresponding to free5gc N2 / N3 interfaces in current 3-namespace deployment
#
# After modifying this file, run: make apply-services
# =============================================================================

services:

  # -------------------------------------------------------------------
  # N2 Control Plane: gNB <-> AMF (SCTP/NGAP, Port 38412)
  # Option 2: SCTP-aware gateway over Ziti UDP
  #
  #   gNB side: gNB(SCTP:38412) -> n2-gateway(SCTP->UDP frame) -> Tunneler intercept
  #   Core network side: Tunneler host -> n2-gateway(UDP frame->SCTP) -> AMF(SCTP:38412)
  #
  # Ziti transmits UDP datagrams; the gateway preserves SCTP metadata such as PPID/stream
  # -------------------------------------------------------------------
  - name: n2-ngap-service
    roleAttributes:
      - core-services
      - control-plane
    configs:
      intercept:
        protocols:
          - udp                # The UDP frame sent from the gNB side gateway
        addresses:
          - amf.ziti           # The gNB side gateway connects to this virtual address
        portRanges:
          - low: 38412
            high: 38412
      host:
        protocol: udp
        address: 127.0.0.1     # The core network side gateway listens on localhost
        port: 38413            # gateway UDP:38413 -> SCTP:127.0.0.18:38412

  # -------------------------------------------------------------------
  # N3 User Plane: gNB <-> UPF (GTP-U, UDP Port 2152)
  # UPF is in core-ns (10.10.2.2), gtpu.addr is set to 10.10.2.2 in upfcfg.yaml
  # SMF informs gNB: UPF is at 10.10.2.2:2152
  # gnb-ns route-based interception steers this packet into ziti0 -> Ziti -> core-ns Tunneler -> UPF
  # -------------------------------------------------------------------
  - name: n3-gtpu-service
    roleAttributes:
      - core-services
      - user-plane
    configs:
      intercept:
        protocols:
          - udp
        addresses:
          - "10.10.2.2"        # veth IP of UPF in core-ns
        portRanges:
          - low: 2152
            high: 2152
      host:
        protocol: udp
        address: 10.10.2.2     # UPF address within core-ns
        port: 2152

  # -------------------------------------------------------------------
  # N3 Downlink: UPF -> gNB (GTP-U, UDP Port 2152)
  # core-ns intercepts downlink packets from UPF to 10.10.1.2:2152 and sends them via Ziti to the gNB GTP-U listening address.
  # UERANSIM gNB is verified to bind to 10.10.1.2:2152 instead of 127.0.0.1:2152.
  # -------------------------------------------------------------------
  - name: n3-gtpu-dl-service
    roleAttributes:
      - core-services
      - user-plane-downlink
    configs:
      intercept:
        protocols:
          - udp
        addresses:
          - "10.10.1.2"        # gNB GTP-U address (actual UPF downlink target)
        portRanges:
          - low: 2152
            high: 2152
      host:
        protocol: udp
        address: 10.10.1.2      # The actual listening address of the gNB process
        port: 2152

  # NOTE:
  # N4 PFCP is intentionally not modeled as a Ziti service in this topology.
  # SMF and UPF both run inside core-ns, so PFCP remains local loopback traffic.

  # -------------------------------------------------------------------
  # SBI Service Bus (optional): HTTP/2 SBI communication between NFs
  # Protect SBI between NRF, AMF, SMF, etc.
