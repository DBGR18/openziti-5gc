# =============================================================================
# Ziti Identities Definitions
# One Identity for each gNB and core network component
#
# After modifying this file, run: make apply-identities
# =============================================================================

identities:

  # ===================================================================
  # gNB side (RAN side)
  # Each gNB host Tunneler needs a separate Identity
  # ===================================================================

  - name: gnb-01
    type: Device
    roleAttributes:
      - gnb-side           # Used for Service Policy matching
      - region-north       # Optional: Classify by region
    enrollment:
      ott: true            # One-Time-Token automatic enrollment

  # Copy and modify when more gNBs are needed:
  # - name: gnb-02
  #   type: Device
  #   roleAttributes:
  #     - gnb-side
  #     - region-north
  #   enrollment:
  #     ott: true

  # - name: gnb-kaohsiung-01
  #   type: Device
  #   roleAttributes:
  #     - gnb-side
  #     - region-south
  #   enrollment:
  #     ott: true

  # ===================================================================
  # Core network side (Core Network side)
  # Tunneler identity of the host where AMF and UPF are located
  # ===================================================================

  - name: core-amf-host
    type: Device
    roleAttributes:
      - core-side
      - control-plane-host  # Can provide N2 service
    enrollment:
      ott: true

  - name: core-upf-host
    type: Device
    roleAttributes:
      - core-side
      - user-plane-host     # Can provide N3/N4 service
    enrollment:
      ott: true

  # Identity in core-ns used to intercept downlink N3 (UPF -> gNB) and send it to Ziti
  - name: core-upf-dialer
    type: Device
    roleAttributes:
      - core-side
      - user-plane-dialer
    enrollment:
      ott: true

  # If AMF and UPF are on the same host, they can be merged into one Identity:
  # - name: core-all-in-one
  #   type: Device
  #   roleAttributes:
  #     - core-side
  #     - control-plane-host
  #     - user-plane-host
  #   enrollment:
  #     ott: true
