# =============================================================================
# Ziti Service Policies -- Access Control Policies
# Define "who can Dial or Bind which services"
#
# After modifying this file, run: make apply-policies
# =============================================================================

servicePolicies:

  # -------------------------------------------------------------------
  # Dial policy: which core network services the gNB can "Call"
  # -------------------------------------------------------------------

  # All gNBs can access N2 (AMF) and N3 (UPF)
  - name: gnb-dial-n2-n3
    type: Dial
    identityRoles:
      - "#gnb-side"            # All Identities matching the "gnb-side" role
    serviceRoles:
      - "#control-plane"       # N2 NGAP
      - "#user-plane"          # N3 GTP-U

  # core-upf-dialer can send downlink N3 (UPF -> gNB) into Ziti
  - name: core-dial-n3-downlink
    type: Dial
    identityRoles:
      - "#user-plane-dialer"
    serviceRoles:
      - "#user-plane-downlink"

  # -------------------------------------------------------------------
  # Bind policy: which services core network hosts can "Provide"
  # -------------------------------------------------------------------

  # AMF host provides N2 service
  - name: core-bind-n2
    type: Bind
    identityRoles:
      - "#control-plane-host"
    serviceRoles:
      - "#control-plane"

  # UPF host provides N3 services
  - name: core-bind-n3
    type: Bind
    identityRoles:
      - "#user-plane-host"
    serviceRoles:
      - "#user-plane"

  # gNB side tunneler provides the downlink N3 host endpoint (10.10.1.2:2152)
  - name: gnb-bind-n3-downlink
    type: Bind
    identityRoles:
      - "#gnb-side"
    serviceRoles:
      - "#user-plane-downlink"

  # -------------------------------------------------------------------
  # Advanced policy examples (uncomment to enable)
  # -------------------------------------------------------------------

  # Restriction: only northern gNBs can connect to the northern core network
  # - name: north-region-only
  #   type: Dial
  #   identityRoles:
  #     - "#region-north"
  #   serviceRoles:
  #     - "#core-north"

  # N4 PFCP policy examples removed because current topology keeps PFCP local in core-ns.
